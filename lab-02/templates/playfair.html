<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playfair Cipher - Test Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet">
    
    <style>
        body {
            background-color: #f0f2f5;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .main-card {
            border: none;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            background-color: white;
            margin-top: 30px;
            overflow: hidden;
        }
        .main-header {
            background: linear-gradient(135deg, #00c6ff 0%, #0072ff 100%);
            color: white;
            padding: 25px;
        }
        .cipher-section {
            padding: 25px;
            border-radius: 15px;
            height: 100%;
            transition: all 0.3s ease;
        }
        .section-encrypt {
            background-color: #f4f9ff;
            border: 1px solid #b3d7ff;
        }
        .section-decrypt {
            background-color: #fcf8ff;
            border: 1px solid #e1b3ff;
        }
        .section-title {
            font-weight: 800;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
        }
        .form-control {
            border-radius: 10px;
            border: 1px solid #ced4da;
            padding: 12px;
        }
        .form-control:focus {
            border-color: #0072ff;
            box-shadow: 0 0 0 0.2rem rgba(0, 114, 255, 0.1);
        }
        .btn-action {
            border-radius: 10px;
            font-weight: 700;
            padding: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .result-box {
            border-radius: 10px;
            padding: 15px;
            margin-top: 20px;
            min-height: 90px;
            word-break: break-all;
            border: 1px dashed #adb5bd;
        }
        .res-encrypt {
            background-color: #e6f0ff;
            color: #004085;
        }
        .res-decrypt {
            background-color: #f3e5f5;
            color: #4a148c;
        }
        
        /* CSS Ma trận 5x5 hiện đại */
        .matrix-card {
            border: none;
            border-radius: 15px;
            background: #ffffff;
            border: 1px solid #e3e8ee;
        }
        .playfair-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            grid-gap: 8px;
            max-width: 320px;
            margin: 0 auto;
        }
        .matrix-cell {
            aspect-ratio: 1;
            border: 2px solid #0072ff;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.2rem;
            background-color: #f8f9fa;
            color: #333;
            text-transform: uppercase;
            transition: all 0.2s ease;
            box-shadow: inset 0 0 5px rgba(0,0,0,0.02);
        }
        .matrix-cell.filled {
            background: linear-gradient(145deg, #0072ff, #0056b3);
            color: white;
            border-color: #0056b3;
            box-shadow: 0 4px 8px rgba(0, 114, 255, 0.2);
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
        <div class="container-fluid mx-3">
            <a class="navbar-brand d-flex align-items-center" href="/">
                <i class="fas fa-chevron-left mr-3 text-primary"></i>
                <span class="font-weight-bold text-dark text-uppercase">Hệ thống Lab HUTECH</span>
            </a>
            <span class="badge badge-pill badge-primary px-3 py-2">Playfair Algorithm</span>
        </div>
    </nav>

    <div class="container-fluid px-lg-5">
        <div class="card main-card">
            
            <div class="main-header text-center">
                <h2 class="font-weight-bold mb-1">PLAYFAIR CIPHER TOOL</h2>
                <p class="mb-0 opacity-75">Mã hóa cặp ký tự (Bigram substitution) kết hợp lưới ma trận khóa sinh động</p>
            </div>

            <div class="card-body p-4">
                <div class="row">
                    
                    <div class="col-lg-8">
                        <div class="row">
                            <div class="col-md-6 mb-4">
                                <div class="cipher-section section-encrypt shadow-sm">
                                    <h5 class="section-title text-primary"><i class="fas fa-lock mr-2"></i>Mã hóa</h5>
                                    <form id="encryptForm" method="POST" action="/playfair/encrypt">
                                        <div class="form-group">
                                            <label class="font-weight-bold">Bản rõ (Plaintext):</label>
                                            <textarea class="form-control" name="inputPlaintext" rows="4" placeholder="Nhập văn bản rõ..." required autofocus></textarea>
                                        </div>
                                        <div class="form-group">
                                            <label class="font-weight-bold">Từ khóa (Key String):</label>
                                            <div class="input-group">
                                                <div class="input-group-prepend">
                                                    <span class="input-group-text bg-primary text-white"><i class="fas fa-keyboard"></i></span>
                                                </div>
                                                <input type="text" class="form-control key-input" id="keyPlain" name="inputKeyPlain" placeholder="Ví dụ: MONARCHY..." required>
                                            </div>
                                        </div>
                                        <button type="submit" class="btn btn-primary btn-block btn-action"><i class="fas fa-shield-alt mr-2"></i> Mã hóa ngầm</button>
                                    </form>
                                    <div id="encryptResult" class="result-box res-encrypt d-none"></div>
                                </div>
                            </div>

                            <div class="col-md-6 mb-4">
                                <div class="cipher-section section-decrypt shadow-sm">
                                    <h5 class="section-title text-purple" style="color: #6f42c1 !important;"><i class="fas fa-unlock-alt mr-2"></i>Giải mã</h5>
                                    <form id="decryptForm" method="POST" action="/playfair/decrypt">
                                        <div class="form-group">
                                            <label class="font-weight-bold">Bản mã (Ciphertext):</label>
                                            <textarea class="form-control" id="cipherTextArea" name="inputCipherText" rows="4" placeholder="Nhập bản mã cặp chữ..." required></textarea>
                                        </div>
                                        <div class="form-group">
                                            <label class="font-weight-bold">Từ khóa (Key String):</label>
                                            <div class="input-group">
                                                <div class="input-group-prepend">
                                                    <span class="input-group-text bg-purple text-white" style="background-color: #6f42c1 !important;"><i class="fas fa-key"></i></span>
                                                </div>
                                                <input type="text" class="form-control key-input" id="keyCipher" name="inputKeyWord" placeholder="Nhập từ khóa giải mã..." required>
                                            </div>
                                        </div>
                                        <button type="submit" class="btn btn-purple btn-block btn-action text-white" style="background-color: #6f42c1 !important;"><i class="fas fa-key mr-2"></i> Giải mã ngầm</button>
                                    </form>
                                    <div id="decryptResult" class="result-box res-decrypt d-none"></div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="col-lg-4 mb-4">
                        <div class="card matrix-card p-4 shadow-sm text-center height-100">
                            <h5 class="font-weight-bold text-secondary mb-3"><i class="fas fa-th mr-2"></i>LIVE MATRIX (5x5)</h5>
                            <p class="small text-muted mb-4">Ma trận tự động cập nhật ngay khi bạn nhập từ khóa (I/J viết chung)</p>
                            
                            <div class="d-flex align-items-center justify-content-center" style="min-height: 260px;">
                                <div id="matrixContainer" class="playfair-grid">
                                    <div class="matrix-cell">-</div><div class="matrix-cell">-</div><div class="matrix-cell">-</div><div class="matrix-cell">-</div><div class="matrix-cell">-</div>
                                    <div class="matrix-cell">-</div><div class="matrix-cell">-</div><div class="matrix-cell">-</div><div class="matrix-cell">-</div><div class="matrix-cell">-</div>
                                    <div class="matrix-cell">-</div><div class="matrix-cell">-</div><div class="matrix-cell">-</div><div class="matrix-cell">-</div><div class="matrix-cell">-</div>
                                    <div class="matrix-cell">-</div><div class="matrix-cell">-</div><div class="matrix-cell">-</div><div class="matrix-cell">-</div><div class="matrix-cell">-</div>
                                    <div class="matrix-cell">-</div><div class="matrix-cell">-</div><div class="matrix-cell">-</div><div class="matrix-cell">-</div><div class="matrix-cell">-</div>
                                </div>
                            </div>
                        </div>
                    </div>

                </div>
            </div>

        </div>
    </div>

    <script>
        // --- 1. CHỨC NĂNG TỰ ĐỘNG RENDERING MA TRẬN KHI GÕ KEY ---
        function generateLiveMatrix(key) {
            if (!key.trim()) return;
            
            let formData = new FormData();
            formData.append('key', key);

            fetch('/api/playfair/creatematrix', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(matrix => {
                const container = document.getElementById('matrixContainer');
                container.innerHTML = ''; // Xóa ma trận cũ
                
                matrix.forEach(row => {
                    row.forEach(letter => {
                        const cell = document.createElement('div');
                        // Nếu là ký tự chữ thực tế thì thêm class 'filled' để đổi màu gradient xanh dương
                        cell.className = 'matrix-cell filled';
                        cell.innerText = letter;
                        container.appendChild(cell);
                    });
                });
            })
            .catch(err => console.error("Lỗi cập nhật ma trận:", err));
        }

        // Lắng nghe sự kiện gõ phím ở cả 2 ô nhập key để vẽ lại ma trận ngay lập tức
        document.querySelectorAll('.key-input').forEach(input => {
            input.addEventListener('input', function() {
                generateLiveMatrix(this.value);
            });
        });


        // --- 2. AJAX XỬ LÝ FORM MÃ HÓA ---
        document.getElementById('encryptForm').addEventListener('submit', function(e) {
            e.preventDefault(); 
            let formData = new FormData(this);
            let keyStr = this.querySelector('input[name="inputKeyPlain"]').value;
            
            fetch(this.action, {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                let resultBox = document.getElementById('encryptResult');
                resultBox.classList.remove('d-none');
                
                resultBox.innerHTML = `
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <span class="font-weight-bold"><i class="fas fa-check-circle"></i> Bản mã Playfair:</span>
                        <button type="button" class="btn btn-sm btn-outline-primary py-0" onclick="pushToDecrypt('${data.result}', '${keyStr}')">
                            <i class="fas fa-arrow-right"></i> Đẩy sang Giải mã
                        </button>
                    </div>
                    <div class="text-monospace p-2 bg-white rounded border font-weight-bold" style="font-size: 1.1rem;">${data.result}</div>
                `;
            })
            .catch(error => console.error('Lỗi mã hóa:', error));
        });


        // --- 3. AJAX XỬ LÝ FORM GIẢI MÃ ---
        document.getElementById('decryptForm').addEventListener('submit', function(e) {
            e.preventDefault(); 
            let formData = new FormData(this);
            
            fetch(this.action, {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                let resultBox = document.getElementById('decryptResult');
                resultBox.classList.remove('d-none');
                resultBox.innerHTML = `
                    <div class="mb-2 font-weight-bold"><i class="fas fa-history"></i> Bản rõ khôi phục:</div>
                    <div class="text-monospace p-2 bg-white rounded border font-weight-bold" style="font-size: 1.1rem;">${data.result}</div>
                `;
            })
            .catch(error => console.error('Lỗi giải mã:', error));
        });

        // Hàm bổ trợ: Đẩy nhanh chuỗi bí mật và key qua ô bên cạnh để giải mã tức thì
        function pushToDecrypt(text, key) {
            document.getElementById('cipherTextArea').value = text;
            document.getElementById('cipherKeyInput').value = key;
            
            // Vẽ lại ma trận theo key của ô giải mã để giao diện đồng bộ
            generateLiveMatrix(key);

            let target = document.querySelector('.section-decrypt');
            target.style.backgroundColor = '#f3e5f5';
            setTimeout(() => {
                target.style.backgroundColor = '#fcf8ff';
            }, 400);
        }
    </script>
</body>
</html>
