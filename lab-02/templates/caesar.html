<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caesar Cipher - Test Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet">
    
    <style>
        body {
            background-color: #f4f6f9;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .main-card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 5px 25px rgba(0,0,0,0.05);
            background-color: white;
            margin-top: 30px;
            margin-bottom: 40px;
        }
        .main-header {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            border-radius: 15px 15px 0 0;
            padding: 20px;
        }
        .cipher-section {
            padding: 20px;
            border-radius: 12px;
            height: 100%;
            background-color: #fff;
            transition: all 0.3s ease;
        }
        .section-encrypt {
            border: 1px solid #cce5ff;
            background-color: #f8fbff;
        }
        .section-decrypt {
            border: 1px solid #d4edda;
            background-color: #f8fff9;
        }
        .section-title {
            font-weight: 700;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid;
        }
        .form-control {
            border-radius: 8px;
            border: 1px solid #ced4da;
        }
        .form-control:focus {
            box-shadow: 0 0 0 0.2rem rgba(30, 60, 114, 0.15);
        }
        .btn-action {
            border-radius: 8px;
            font-weight: 600;
            padding: 10px;
            transition: all 0.2s;
        }
        .result-box {
            border-radius: 8px;
            padding: 15px;
            margin-top: 20px;
            min-height: 80px;
            word-break: break-all;
            border-left: 5px solid;
        }
        .res-encrypt {
            background-color: #e6f4ea;
            color: #137333;
            border-left-color: #1e8e3e;
            border: 1px solid #dadce0;
        }
        .res-decrypt {
            background-color: #feffff;
            color: #1a73e8;
            border-left-color: #1a73e8;
            border: 1px solid #dadce0;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
        <div class="container-fluid mx-3">
            <a class="navbar-brand d-flex align-items-center" href="/">
                <i class="fas fa-arrow-left text-muted mr-3"></i>
                <span class="font-weight-bold text-dark text-uppercase small">Quay lại Dashboard chính</span>
            </a>
            <span class="badge badge-dark p-2"><i class="fas fa-flask mr-1"></i> Giao diện biểu mẫu song song</span>
        </div>
    </nav>

    <div class="container-fluid px-4">
        <div class="card main-card">
            
            <div class="main-header text-center">
                <h3 class="font-weight-bold mb-1 text-uppercase"><i class="fas fa-sync-alt mr-2"></i>CAESAR CIPHER TESTING GRID</h3>
                <p class="mb-0 small opacity-75">Bố cục màn hình đôi hỗ trợ kiểm thử luồng mã hóa và giải mã liên tục tại chỗ</p>
            </div>

            <div class="card-body p-4">
                <div class="row">
                    
                    <div class="col-md-6 mb-4 mb-md-0">
                        <div class="cipher-section section-encrypt shadow-sm">
                            <h5 class="section-title text-primary"><i class="fas fa-lock mr-2"></i>ENCRYPTION (MÃ HÓA)</h5>
                            
                            <form id="encryptForm" method="POST" action="/caesar/encrypt">
                                <div class="form-group">
                                    <label class="font-weight-bold text-secondary">Văn bản rõ (Plain text):</label>
                                    <textarea class="form-control" name="inputPlainText" rows="4" placeholder="Nhập chuỗi văn bản gốc tại đây..." required autofocus></textarea>
                                </div>
                                
                                <div class="form-group">
                                    <label class="font-weight-bold text-secondary">Khóa K (Key Integer):</label>
                                    <div class="input-group">
                                        <div class="input-group-prepend">
                                            <span class="input-group-text"><i class="fas fa-key text-muted"></i></span>
                                        </div>
                                        <input type="number" class="form-control" name="inputKeyPlain" placeholder="Nhập số nguyên (ví dụ: 3)" required>
                                    </div>
                                </div>
                                
                                <button type="submit" class="btn btn-primary btn-block btn-action shadow-sm"><i class="fas fa-arrow-circle-right mr-1"></i> Mã hóa ngầm</button>
                            </form>
                            
                            <div id="encryptResult" class="result-box res-encrypt d-none shadow-xs"></div>
                        </div>
                    </div>

                    <div class="col-md-6">
                        <div class="cipher-section section-decrypt shadow-sm">
                            <h5 class="section-title text-success"><i class="fas fa-unlock mr-2"></i>DECRYPTION (GIẢI MÃ)</h5>
                            
                            <form id="decryptForm" method="POST" action="/caesar/decrypt">
                                <div class="form-group">
                                    <label class="font-weight-bold text-secondary">Văn bản mã hóa (Cipher text):</label>
                                    <textarea class="form-control" id="cipherTextArea" name="inputCipherText" rows="4" placeholder="Nhập hoặc dán chuỗi bí mật cần bẻ khóa..." required></textarea>
                                </div>
                                
                                <div class="form-group">
                                    <label class="font-weight-bold text-secondary">Khóa K (Key Integer):</label>
                                    <div class="input-group">
                                        <div class="input-group-prepend">
                                            <span class="input-group-text"><i class="fas fa-key text-muted"></i></span>
                                        </div>
                                        <input type="number" class="form-control" id="cipherKeyInput" name="inputKeyCipher" placeholder="Nhập đúng khóa K để hoàn tác" required>
                                    </div>
                                </div>
                                
                                <button type="submit" class="btn btn-success btn-block btn-action shadow-sm"><i class="fas fa-arrow-circle-left mr-1"></i> Giải mã ngầm</button>
                            </form>
                            
                            <div id="decryptResult" class="result-box res-decrypt d-none shadow-xs"></div>
                        </div>
                    </div>

                </div>
            </div>

        </div>
    </div>

    <script>
        // 1. Xử lý Form Mã Hóa (Encrypt)
        document.getElementById('encryptForm').addEventListener('submit', function(e) {
            e.preventDefault(); 
            let formData = new FormData(this);
            let plainKey = this.querySelector('input[name="inputKeyPlain"]').value;
            
            fetch(this.action, {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                let resultBox = document.getElementById('encryptResult');
                resultBox.classList.remove('d-none');
                
                // Hiển thị kết quả kèm nút bấm "Đẩy sang giải mã" để phục vụ việc test nhanh
                resultBox.innerHTML = `
                    <div class="d-flex justify-content-between align-items-center mb-1">
                        <strong><i class="fas fa-check-circle"></i> Bản mã thu được:</strong>
                        <button type="button" class="btn btn-xs btn-outline-success btn-sm py-0" onclick="pushToDecrypt('${data.result}', ${plainKey})">
                            <i class="fas fa-share"></i> Đẩy sang ô Giải Mã
                        </button>
                    </div>
                    <span class="text-monospace font-weight-bold" style="font-size: 1.15rem;">${data.result}</span>
                `;
            })
            .catch(error => console.error('Lỗi mã hóa:', error));
        });

        // 2. Xử lý Form Giải Mã (Decrypt)
        document.getElementById('decryptForm').addEventListener('submit', function(e) {
            e.preventDefault(); 
            let formData = new FormData(this);
            
            fetch(this.action, {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                let resultBox = document.getElementById('decryptResult');
                resultBox.classList.remove('d-none');
                resultBox.innerHTML = `
                    <strong><i class="fas fa-history"></i> Bản rõ khôi phục:</strong><br>
                    <span class="text-monospace font-weight-bold" style="font-size: 1.15rem;">${data.result}</span>
                `;
            })
            .catch(error => console.error('Lỗi giải mã:', error));
        });

        // Hàm bổ trợ: Tự động copy điền chuỗi vừa mã hóa và Key sang cột Giải mã để test tức thì
        function pushToDecrypt(cipherText, key) {
            document.getElementById('cipherTextArea').value = cipherText;
            document.getElementById('cipherKeyInput').value = key;
            
            // Tạo hiệu ứng highlight nhẹ giúp nhận biết dữ liệu vừa được chuyển đổi sang
            let decryptSection = document.querySelector('.section-decrypt');
            decryptSection.style.backgroundColor = '#e8f5e9';
            setTimeout(() => {
                decryptSection.style.backgroundColor = '#f8fff9';
            }, 500);
        }
    </script>
</body>
</html>
