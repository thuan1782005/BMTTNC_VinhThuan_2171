<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vigenere Cipher - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet">
    
    <style>
        body {
            background-color: #f0f2f5;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .main-card {
            border: none;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            background-color: white;
            margin-top: 30px;
            overflow: hidden;
        }
        .main-header {
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            color: white;
            padding: 25px;
        }
        .cipher-section {
            padding: 25px;
            border-radius: 15px;
            height: 100%;
            transition: all 0.3s ease;
        }
        .section-encrypt {
            background-color: #f8faff;
            border: 1px solid #dee2e6;
        }
        .section-decrypt {
            background-color: #fafffb;
            border: 1px solid #dee2e6;
        }
        .section-title {
            font-weight: 800;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
        }
        .form-control {
            border-radius: 10px;
            border: 1px solid #ced4da;
            padding: 12px;
        }
        .form-control:focus {
            border-color: #2575fc;
            box-shadow: 0 0 0 0.2rem rgba(37, 117, 252, 0.1);
        }
        .btn-action {
            border-radius: 10px;
            font-weight: 700;
            padding: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .result-box {
            border-radius: 10px;
            padding: 15px;
            margin-top: 20px;
            min-height: 90px;
            word-break: break-all;
            border: 1px dashed #adb5bd;
            position: relative;
        }
        .res-encrypt {
            background-color: #eef2ff;
            color: #3730a3;
        }
        .res-decrypt {
            background-color: #ecfdf5;
            color: #065f46;
        }
        .badge-key {
            background-color: #e9ecef;
            color: #495057;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="/">
                <i class="fas fa-chevron-left mr-3 text-primary"></i>
                <span class="font-weight-bold text-dark text-uppercase">Hệ thống Lab HUTECH</span>
            </a>
            <span class="badge badge-pill badge-primary px-3 py-2">Vigenere Algorithm</span>
        </div>
    </nav>

    <div class="container-fluid px-lg-5">
        <div class="card main-card">
            
            <div class="main-header text-center">
                <h2 class="font-weight-bold mb-1">VIGENERE CIPHER TOOL</h2>
                <p class="mb-0 opacity-75">Thuật toán mã hóa đa ký tự thay thế sử dụng từ khóa (Keyword)</p>
            </div>

            <div class="card-body p-4">
                <div class="row">
                    
                    <div class="col-md-6 mb-4 mb-md-0">
                        <div class="cipher-section section-encrypt shadow-sm">
                            <h5 class="section-title text-primary"><i class="fas fa-lock mr-2"></i>Mã hóa văn bản</h5>
                            
                            <form id="encryptForm" method="POST" action="/vigenere/encrypt">
                                <div class="form-group">
                                    <label class="font-weight-bold">Bản rõ (Plaintext):</label>
                                    <textarea class="form-control" name="inputPlaintext" rows="4" placeholder="Nhập văn bản cần bảo mật..." required autofocus></textarea>
                                </div>
                                
                                <div class="form-group">
                                    <label class="font-weight-bold">Từ khóa (Key String):</label>
                                    <div class="input-group">
                                        <div class="input-group-prepend">
                                            <span class="input-group-text bg-primary text-white"><i class="fas fa-keyboard"></i></span>
                                        </div>
                                        <input type="text" class="form-control" name="inputKeyPlain" placeholder="Ví dụ: HUTECH, SECRET..." required>
                                    </div>
                                </div>
                                
                                <button type="submit" class="btn btn-primary btn-block btn-action"><i class="fas fa-shield-alt mr-2"></i> Thực hiện mã hóa</button>
                            </form>
                            
                            <div id="encryptResult" class="result-box res-encrypt d-none"></div>
                        </div>
                    </div>

                    <div class="col-md-6">
                        <div class="cipher-section section-decrypt shadow-sm">
                            <h5 class="section-title text-success"><i class="fas fa-unlock-alt mr-2"></i>Giải mã văn bản</h5>
                            
                            <form id="decryptForm" method="POST" action="/vigenere/decrypt">
                                <div class="form-group">
                                    <label class="font-weight-bold">Bản mã (Ciphertext):</label>
                                    <textarea class="form-control" id="cipherTextArea" name="inputCipherText" rows="4" placeholder="Nhập bản mã bí mật..." required></textarea>
                                </div>
                                
                                <div class="form-group">
                                    <label class="font-weight-bold">Từ khóa (Key String):</label>
                                    <div class="input-group">
                                        <div class="input-group-prepend">
                                            <span class="input-group-text bg-success text-white"><i class="fas fa-key"></i></span>
                                        </div>
                                        <input type="text" class="form-control" id="cipherKeyInput" name="inputKeyCipher" placeholder="Nhập từ khóa để giải mã..." required>
                                    </div>
                                </div>
                                
                                <button type="submit" class="btn btn-success btn-block btn-action"><i class="fas fa-key mr-2"></i> Thực hiện giải mã</button>
                            </form>
                            
                            <div id="decryptResult" class="result-box res-decrypt d-none"></div>
                        </div>
                    </div>

                </div>
            </div>

        </div>
    </div>

    <script>
        // Xử lý AJAX cho Form Mã Hóa
        document.getElementById('encryptForm').addEventListener('submit', function(e) {
            e.preventDefault(); 
            let formData = new FormData(this);
            let keyStr = this.querySelector('input[name="inputKeyPlain"]').value;
            
            fetch(this.action, {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                let resultBox = document.getElementById('encryptResult');
                resultBox.classList.remove('d-none');
                
                resultBox.innerHTML = `
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <span class="font-weight-bold"><i class="fas fa-check-circle"></i> Kết quả bản mã:</span>
                        <button type="button" class="btn btn-sm btn-primary py-0" onclick="pushToDecrypt('${data.result}', '${keyStr}')">
                            <i class="fas fa-arrow-right"></i> Chuyển sang Giải mã
                        </button>
                    </div>
                    <div class="text-monospace p-2 bg-white rounded border font-weight-bold" style="font-size: 1.1rem; min-height: 40px;">${data.result}</div>
                `;
            })
            .catch(error => console.error('Lỗi:', error));
        });

        // Xử lý AJAX cho Form Giải Mã
        document.getElementById('decryptForm').addEventListener('submit', function(e) {
            e.preventDefault(); 
            let formData = new FormData(this);
            
            fetch(this.action, {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                let resultBox = document.getElementById('decryptResult');
                resultBox.classList.remove('d-none');
                resultBox.innerHTML = `
                    <div class="mb-2 font-weight-bold"><i class="fas fa-history"></i> Bản rõ khôi phục được:</div>
                    <div class="text-monospace p-2 bg-white rounded border font-weight-bold" style="font-size: 1.1rem; min-height: 40px;">${data.result}</div>
                `;
            })
            .catch(error => console.error('Lỗi:', error));
        });

        // Hàm hỗ trợ test: Tự động điền dữ liệu sang cột Giải mã
        function pushToDecrypt(text, key) {
            document.getElementById('cipherTextArea').value = text;
            document.getElementById('cipherKeyInput').value = key;
            
            // Hiệu ứng thông báo cho người dùng
            let target = document.querySelector('.section-decrypt');
            target.style.transform = "scale(1.02)";
            target.style.boxShadow = "0 0 20px rgba(40, 167, 69, 0.3)";
            setTimeout(() => {
                target.style.transform = "scale(1)";
                target.style.boxShadow = "none";
            }, 400);
        }
    </script>
</body>
</html>
